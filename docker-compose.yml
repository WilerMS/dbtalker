services:
  postgres_service:
    image: postgres:16-alpine
    container_name: dbtalkie-postgres-service
    ports:
      - "${DB_PORT}:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
      - DEMO_DB_NAME=${DEMO_DB_NAME}
    env_file:
      - .env
    volumes:
      - postgres_service_data:/var/lib/postgresql/data
      - ./scripts/init-demo.sql:/tmp/init-demo.sql:ro
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: dbtalkie-backend
    working_dir: /app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
        - VITE_DEMO_DB_ID=${VITE_DEMO_DB_ID}
        - VITE_DEMO_USER_ID=${VITE_DEMO_USER_ID}
    container_name: dbtalkie-frontend
    ports:
      - "8001:8001"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_service_data:
  backend_venv:
  frontend_node_modules:

services:
  postgres:
    image: postgres:16-alpine
    container_name: dbtalkie-postgres
    ports:
      - "${DB_PORT}:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: dbtalkie-backend
    working_dir: /app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips="*"
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - backend_venv:/app/.venv
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    container_name: dbtalkie-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  postgres-demo:
    image: postgres:16-alpine
    container_name: dbtalkie_postgres_demo
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DEMO_DB_USER}
      POSTGRES_PASSWORD: ${DEMO_DB_PASSWORD}
      POSTGRES_DB: ${DEMO_DB_NAME}
    ports:
      - "${DEMO_DB_PORT}:5432"
    volumes:
      - postgres_demo_data:/var/lib/postgresql/data
      - ./scripts/init-demo.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  postgres_data:
  backend_venv:
  frontend_node_modules:
  postgres_demo_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: dbtalkie-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=dbtalkie
      - POSTGRES_PASSWORD=dbtalkie
      - POSTGRES_DB=dbtalkie
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbtalkie -d dbtalkie"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: dbtalkie-backend
    working_dir: /app
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - backend_venv:/app/.venv
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=dbtalkie
      - DB_PASSWORD=dbtalkie
      - DB_NAME=dbtalkie
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: dbtalkie-frontend
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_BASE_URL=http://172.31.240.184:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  backend_venv:
  frontend_node_modules:
